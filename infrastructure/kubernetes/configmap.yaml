apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-platform-config
  labels:
    app: payment-platform
data:
  APP_NAME: "payment-platform"
  APP_ENV: "production"
  APP_DEBUG: "false"
  LOG_LEVEL: "INFO"
  
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "4"
  
  WEBHOOK_HOST: "0.0.0.0"
  WEBHOOK_PORT: "8001"
  WEBHOOK_WORKERS: "4"
  
  ADMIN_HOST: "0.0.0.0"
  ADMIN_PORT: "8002"
  ADMIN_WORKERS: "2"
  
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "10"
  DATABASE_POOL_TIMEOUT: "30"
  DATABASE_POOL_RECYCLE: "3600"
  
  REDIS_MAX_CONNECTIONS: "50"
  REDIS_SOCKET_TIMEOUT: "5"
  REDIS_SOCKET_CONNECT_TIMEOUT: "5"
  
  CELERY_BROKER_POOL_LIMIT: "10"
  CELERY_WORKER_CONCURRENCY: "4"
  CELERY_WORKER_PREFETCH_MULTIPLIER: "4"
  CELERY_TASK_SOFT_TIME_LIMIT: "300"
  CELERY_TASK_TIME_LIMIT: "600"
  CELERY_BROKER_CONNECTION_RETRY_ON_STARTUP: "true"
  
  WEBHOOK_RETRY_MAX_ATTEMPTS: "5"
  WEBHOOK_RETRY_DELAY_SECONDS: "60"
  WEBHOOK_TIMEOUT_SECONDS: "30"
  
  PAYMENT_INTENT_EXPIRATION_SECONDS: "3600"
  PAYMENT_METHOD_CACHE_TTL: "3600"
  
  RATE_LIMIT_REQUESTS_PER_MINUTE: "1000"
  RATE_LIMIT_BURST: "100"
  
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
  TRACING_ENABLED: "true"
  TRACING_SAMPLE_RATE: "0.1"
  
  CORS_ORIGINS: "https://app.payment-platform.io,https://admin.payment-platform.io"
  CORS_ALLOW_CREDENTIALS: "true"
  
  SECURITY_HEADERS_ENABLED: "true"
  CONTENT_SECURITY_POLICY: "default-src 'self'"
  X_FRAME_OPTIONS: "DENY"
  X_CONTENT_TYPE_OPTIONS: "nosniff"
  
  S3_ENDPOINT: "s3.amazonaws.com"
  S3_REGION: "us-east-1"
  
  KMS_KEY_ID: "alias/payment-platform-key"
  
  CLOUDWATCH_NAMESPACE: "PaymentPlatform"
  CLOUDWATCH_ENABLED: "true"
