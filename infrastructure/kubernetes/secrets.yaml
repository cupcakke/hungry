apiVersion: v1
kind: Secret
metadata:
  name: payment-platform-secrets
  labels:
    app: payment-platform
type: Opaque
stringData:
  SECRET_KEY: "your-secret-key-change-in-production"
  ENCRYPTION_KEY: "your-encryption-key-32-characters-change"
  
  DATABASE_URL: "postgresql://payment_user:change_me_password@postgres-primary.payment-platform.svc.cluster.local:5432/payment_platform"
  DATABASE_REPLICA_URL: "postgresql://payment_user:change_me_password@postgres-replica.payment-platform.svc.cluster.local:5432/payment_platform"
  
  REDIS_URL: "redis://redis-master.payment-platform.svc.cluster.local:6379/0"
  
  CELERY_BROKER_URL: "redis://redis-master.payment-platform.svc.cluster.local:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis-master.payment-platform.svc.cluster.local:6379/2"
  
  AWS_ACCESS_KEY_ID: "your-aws-access-key-id"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-access-key"
  AWS_REGION: "us-east-1"
  
  S3_BUCKET_NAME: "payment-platform-files"
  S3_BACKUP_BUCKET: "payment-platform-backups"
  
  STRIPE_API_KEY: "sk_live_your_stripe_api_key"
  STRIPE_WEBHOOK_SECRET: "whsec_your_stripe_webhook_secret"
  
  PAYPAL_CLIENT_ID: "your_paypal_client_id"
  PAYPAL_CLIENT_SECRET: "your_paypal_client_secret"
  
  SENDGRID_API_KEY: "SG.your_sendgrid_api_key"
  TWILIO_ACCOUNT_SID: "your_twilio_account_sid"
  TWILIO_AUTH_TOKEN: "your_twilio_auth_token"
  
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/your/webhook/url"
  
  DATADOG_API_KEY: "your_datadog_api_key"
  DATADOG_APP_KEY: "your_datadog_app_key"
  
  SENTRY_DSN: "https://your-sentry-dsn@sentry.io/project-id"
  
  NEW_RELIC_LICENSE_KEY: "your_new_relic_license_key"
  
  WEBHOOK_SIGNING_SECRET: "your-webhook-signing-secret-change"
  
  ADMIN_JWT_SECRET: "your-admin-jwt-secret-change"
  ADMIN_API_KEY: "your-admin-api-key-change"
  
  KMS_KEY_ARN: "arn:aws:kms:us-east-1:123456789012:key/your-kms-key-id"
  
  HSM_PARTITION_PASSWORD: "your-hsm-partition-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: payment-platform-tls
  labels:
    app: payment-platform
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    MIIFazCCA1OgAwIBAgISAzABCDEFGHijklmnopqrstuvwxyz1234567890
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    MIIEvQIBADANBgkqhkiG9w0BAQEFAASCBKcwggSjAgEAAoIBAQC1234567890
    -----END PRIVATE KEY-----
---
apiVersion: v1
kind: Secret
metadata:
  name: payment-platform-database-credentials
  labels:
    app: payment-platform
type: Opaque
stringData:
  username: "payment_user"
  password: "change_me_password"
  database: "payment_platform"
---
apiVersion: v1
kind: Secret
metadata:
  name: payment-platform-redis-credentials
  labels:
    app: payment-platform
type: Opaque
stringData:
  password: "change_me_redis_password"
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app: payment-platform
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: payment-platform-service-account
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payment-platform-external-secrets
  labels:
    app: payment-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: payment-platform-secrets-synced
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: payment-platform/secrets
        property: secret_key
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: payment-platform/secrets
        property: encryption_key
    - secretKey: DATABASE_URL
      remoteRef:
        key: payment-platform/database
        property: connection_string
    - secretKey: STRIPE_API_KEY
      remoteRef:
        key: payment-platform/integrations
        property: stripe_api_key
